<!DOCTYPE html>
<html lang="ru-RU">
<head>

  <title>Технические работы — Экскаватор Ру</title>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    ::after, ::before {
      box-sizing: border-box;
    }

    html {
      text-size-adjust: none;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      line-height: 1.45;
    }

    ::selection {
      background: #fff;
      color: #004297;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-width: 375px;
      padding: 40px;
      text-align: center;
      background: #004297;
      color: #fff;
      font-family: "Montserrat", sans-serif;
      font-size: 18px;
    }

    .title {
      margin-bottom: 32px;
      line-height: 1.35;
      font-size: 37px;
    }

    .text {
      line-height: 1.6;
      font-size: 18px;
    }

    @media (max-width: 767px) {
      body {
        padding: 20px;
      }
    }
  </style>

</head>
<body>

  <h1 class="title">Технические работы</h1>

  <p class="text">В данный момент мы улучшаем сайт и в ближайшее время он продолжит работу</p>

</body>
</html>
